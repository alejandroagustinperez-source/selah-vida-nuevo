<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image — Selah Vida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Georgia:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #F5F0E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 60px 80px;
    }
    .dove {
      font-size: 72px;
      margin-bottom: 16px;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 64px;
      font-weight: 700;
      color: #C9A84C;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .subtitle {
      font-family: Inter, sans-serif;
      font-size: 24px;
      font-weight: 400;
      color: #5a5a5a;
      margin-bottom: 48px;
    }
    .divider {
      width: 80px;
      height: 2px;
      background: #C9A84C;
      margin: 0 auto 48px;
      border-radius: 1px;
    }
    .features {
      display: flex;
      gap: 48px;
      justify-content: center;
      font-family: Inter, sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #1a3a4a;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .feature-icon {
      font-size: 28px;
    }
    .divider-dot {
      color: #C9A84C;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="dove">🕊️</div>
    <h1>Selah Vida</h1>
    <p class="subtitle">Tu acompañante espiritual 24/7</p>
    <div class="divider"></div>
    <div class="features">
      <span class="feature-item"><span class="feature-icon">🎵</span> Música</span>
      <span class="feature-item"><span>·</span></span>
      <span class="feature-item"><span class="feature-icon">🎮</span> Juegos</span>
      <span class="feature-item"><span>·</span></span>
      <span class="feature-item"><span class="feature-icon">🙏</span> Oración</span>
    </div>
  </div>
</body>
</html>
